name: mizdah
description: "A new Flutter project."
# The following line prevents the package from being accidentally published to
# pub.dev using `flutter pub publish`. This is preferred for private packages.
publish_to: 'none' # Remove this line if you wish to publish to pub.dev

# The following defines the version and build number for your application.
# A version number is three numbers separated by dots, like 1.2.43
# followed by an optional build number separated by a +.
# Both the version and the builder number may be overridden in flutter
# build by specifying --build-name and --build-number, respectively.
# In Android, build-name is used as versionName while build-number used as versionCode.
# Read more about Android versioning at https://developer.android.com/studio/publish/versioning
# In iOS, build-name is used as CFBundleShortVersionString while build-number is used as CFBundleVersion.
# Read more about iOS versioning at
# https://developer.apple.com/library/archive/documentation/General/Reference/InfoPlistKeyReference/Articles/CoreFoundationKeys.html
# In Windows, build-name is used as the major, minor, and patch parts
# of the product and file versions while build-number is used as the build suffix.
version: 1.0.0+1

environment:
  sdk: ^3.6.0

# Dependencies specify other packages that your package needs in order to work.
# To automatically upgrade your package dependencies to the latest versions
# consider running `flutter pub upgrade --major-versions`. Alternatively,
# dependencies can be manually updated by changing the version numbers below to
# the latest version available on pub.dev. To see which dependencies have newer
# versions available, run `flutter pub outdated`.
dependencies:
  flutter:
    sdk: flutter

  # The following adds the Cupertino Icons font to your application.
  # Use with the CupertinoIcons class for iOS style icons.
  cupertino_icons: ^1.0.8
  flutter_riverpod: ^2.6.1
  go_router: ^14.7.2
  shared_preferences: ^2.5.2
  google_fonts: ^6.2.1
  flutter_svg: ^2.0.16
  intl: ^0.19.0
  flutter_secure_storage: ^9.2.2
  dio: ^5.7.0
  web_socket_channel: ^3.0.1
  permission_handler: ^11.3.1
  share_plus: ^12.0.1
  flutter_webrtc: ^0.12.7
  mediasoup_client_flutter:
    path: ./local_packages/mediasoup_client_flutter
  shimmer: ^3.0.0
  animations: ^2.0.11
  flutter_blurhash: ^0.8.2
  socket_io_client: any
  file_picker: ^10.3.10
  url_launcher: ^6.3.2
  google_sign_in: ^7.2.0
  googleapis: ^16.0.0
  googleapis_auth: ^2.3.0
  http: ^1.6.0
  emoji_picker_flutter: ^4.3.0
  # On-device speech-to-text for live captions. Uses Android's
  # SpeechRecognizer / iOS's Speech framework; no extra perms beyond
  # RECORD_AUDIO which we already request for the mic.
  speech_to_text: ^7.0.0
  # Firebase Cloud Messaging — used for chat / call / meeting push
  # notifications. firebase_options.dart was already generated via
  # `flutterfire configure`. Bumping the deps forward; pin minor
  # ranges with caret.
  firebase_core: ^3.6.0
  firebase_messaging: ^15.1.3
  # Required for FOREGROUND notification display. FCM only auto-draws
  # a system notification when the app is backgrounded; when it's in
  # the foreground we receive the message via `onMessage` and have to
  # draw the notification ourselves. flutter_local_notifications is
  # the canonical plugin for that (used by every prod messenger app —
  # WhatsApp/Telegram/Signal style).
  # Pinned to 18.x — 17.2.3 has a known iOS build break
  # ("Method definition for 'setRegistrarPlugins:' not found" in
  # FlutterLocalNotificationsPlugin.m) that surfaces against newer
  # Flutter SDKs. 18.0.1 ships the corrected ObjC method impl and
  # supports the same Dart API surface we already use.
  flutter_local_notifications: ^18.0.1
  # Pulled in transitively by flutter_local_notifications, but we
  # import it directly for `zonedSchedule`'s `TZDateTime` API — so
  # declare it explicitly to silence depend_on_referenced_packages.
  timezone: ^0.9.4
  # Read access to the device's native calendar database. We use it
  # to read back the *actual* start/end times of a meeting AFTER the
  # user saves it inside Google Calendar — there is no other way to
  # know the user's real choice without OAuth + Calendar API.
  # See lib/features/scheduling/calendar_event_sync.dart.
  device_calendar: ^4.3.3
  # Phone-number input on the register screen — bundles a country
  # picker, formats while typing, and emits a full E.164 string
  # (the format the backend expects per
  # docs/PHONE_AND_CONTACTS_BACKEND.md §6).
  intl_phone_field: ^3.2.0
  # Read device address book + normalise raw phone strings to E.164
  # for the contacts-sync feature. flutter_contacts handles the
  # platform permission + paging, phone_numbers_parser does the
  # E.164 conversion offline (no network round-trip).
  flutter_contacts: ^1.1.9+2
  phone_numbers_parser: ^8.3.0
  # Low-latency looped playback for P2P call ringback (caller side)
  # and incoming ring (receiver side). Cf.
  # docs/CALL_RINGTONE_FLUTTER.md §2. `audioplayers` chosen over
  # `just_audio` for simpler asset-source playback and the
  # ReleaseMode.loop API which matches the 3–6s loop pattern.
  audioplayers: ^6.1.0
  # Per-tile viewport-visibility detection so off-screen video tiles
  # in the meeting grid can pause their decoder via `track.enabled
  # = false`. Standard "render what you can see" optimisation that
  # every video-conferencing app applies — frees both CPU (decode
  # pipeline) and GPU (paint) for the visible tiles. ~6 KB.
  visibility_detector: ^0.4.0+2

dev_dependencies:
  flutter_test:
    sdk: flutter

  # The "flutter_lints" package below contains a set of recommended lints to
  # encourage good coding practices. The lint set provided by the package is
  # activated in the `analysis_options.yaml` file located at the root of your
  # package. See that file for information about deactivating specific lint
  # rules and activating additional ones.
  flutter_lints: ^5.0.0

  # Generates platform launcher icons from a single source PNG.
  # Run `dart run flutter_launcher_icons` after editing the
  # source images in assets/launcher/.
  flutter_launcher_icons: ^0.14.4

# Source: assets/launcher/icon.png (square 1024×1024 with the
# Mizdah wordmark on white). Adaptive icon foreground is sized
# tighter (the platform crops ~33% off each side). Background is
# white to match the wordmark. Remove `remove_alpha_ios: true`
# only if you intentionally want a transparent iOS icon.
flutter_launcher_icons:
  android: true
  ios: true
  image_path: "assets/launcher/icon.png"
  adaptive_icon_background: "#FFFFFF"
  adaptive_icon_foreground: "assets/launcher/icon_foreground.png"
  remove_alpha_ios: true
  min_sdk_android: 21
  web:
    generate: true
    image_path: "assets/launcher/icon.png"
    background_color: "#FFFFFF"
    theme_color: "#2563EB"

# For information on the generic Dart part of this file, see the
# following page: https://dart.dev/tools/pub/pubspec

# The following section is specific to Flutter packages.
flutter:

  # The following line ensures that the Material Icons font is
  # included with your application, so that you can use the icons in
  # the material Icons class.
  uses-material-design: true

  # To add assets to your application, add an assets section, like this:
  # Registering the whole `assets/images/` directory so any image
  # dropped in (bg_image.png, future hero illustrations, etc.) is
  # picked up without having to edit pubspec each time.
  assets:
    - assets/images/
    # P2P call ringback (caller side) + incoming ring (receiver
    # side) MP3 files. See docs/CALL_RINGTONE_FLUTTER.md §1 for the
    # exact files we expect and assets/sounds/README.md for where
    # to drop replacements. RingtoneService gracefully no-ops if a
    # file is missing, so the build stays green during dev.
    - assets/sounds/
  #   - images/a_dot_ham.jpeg

  # An image asset can refer to one or more resolution-specific "variants", see
  # https://flutter.dev/to/resolution-aware-images

  # For details regarding adding assets from package dependencies, see
  # https://flutter.dev/to/asset-from-package

  # To add custom fonts to your application, add a fonts section here,
  # in this "flutter" section. Each entry in this list should have a
  # "family" key with the font family name, and a "fonts" key with a
  # list giving the asset and other descriptors for the font. For
  # example:
  # fonts:
  #   - family: Schyler
  #     fonts:
  #       - asset: fonts/Schyler-Regular.ttf
  #       - asset: fonts/Schyler-Italic.ttf
  #         style: italic
  #   - family: Trajan Pro
  #     fonts:
  #       - asset: fonts/TrajanPro.ttf
  #       - asset: fonts/TrajanPro_Bold.ttf
  #         weight: 700
  #
  # For details regarding fonts from package dependencies,
  # see https://flutter.dev/to/font-from-package

